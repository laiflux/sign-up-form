<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up here</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet"></head>
<body>
    <div id="container">
        <div class="image">
            <img class="image" src="https://images.unsplash.com/photo-1770462988018-7d1c4b198ead?q=80&w=1035&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D ">
            <p class="image" id="logo">praxis</p>
            <p class="image">Photo by <a href="https://unsplash.com/@kristapsungurs">Kristaps Ungurs</a> on <a href="https://unsplash.com/photos/cracked-ice-fragments-in-shades-of-blue-377wpNK0_fM">Unsplash</a></p>
         </div> 
        <div id="text-stuff">
            <header>
                this is a sign up - mock up
                </br><span id="subtitle">consider it practice for when you
                </br><span id="actually">actually</span>
                    need to apply somewhere</span> 
                </br>
                <span id="welcome">you're welcome.</span>
            </header>
            
            <form action="" method="get">
                <div class="form-group">
                    <label for="first-name">FIRST NAME:</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="form-group">
                    <label for="last-name">LAST NAME:</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>
                <div class="form-group">
                    <label for="email">EMAIL:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">PHONE:</label>
                    <input type="text" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="password">PASSWORD:</label>
                    <input type="password" name="password" id="password" required>
               </div>
                <div class="form-group">
                    <label for="confirm-password">CONFIRM PASSWORD:</label>
                    <input type="password" name="confirm-password" id="confirm-password" required>
                </div>  
             </form>
            <div class='submit'>
                <button type="button">Create Account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
          </div>
        </div>
          
    </div>
</body>
</html>
